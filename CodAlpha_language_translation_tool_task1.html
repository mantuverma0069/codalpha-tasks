<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Translation Tool - CodeAlpha</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .translator-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 850px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .translation-box {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .translation-box {
                grid-template-columns: 1fr 1fr;
            }
        }

        .box-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        textarea:disabled {
            background-color: #f1f5f9;
            color: var(--text-main);
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .icon-btn:hover {
            background-color: #f1f5f9;
            border-color: var(--text-muted);
        }

        .translate-btn {
            grid-column: 1 / -1;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .translate-btn:hover {
            background-color: var(--primary-hover);
        }

        .translate-btn:disabled {
            background-color: #a5b4fc;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #334155;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="translator-container">
        <header>
            <h1>Language Translation Tool</h1>
            <p>CodeAlpha AI Internship - Task 1</p>
        </header>

        <div class="translation-box">
            <div class="box-panel">
                <label for="sourceLanguage">Source Language</label>
                <select id="sourceLanguage">
                    <option value="auto">Detect Language</option>
                    <option value="en" selected>English</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                    <option value="pt">Portuguese (Português)</option>
                    <option value="zh">Chinese (中文)</option>
                    <option value="ja">Japanese (日本語)</option>
                    <option value="ar">Arabic (العربية)</option>
                    <option value="hi">Hindi (हिन्दी)</option>
                </select>
                <textarea id="sourceText" placeholder="Type text to translate here..."></textarea>
                <div class="action-row">
                    <div class="btn-group">
                        <button class="icon-btn" id="speakSourceBtn" title="Listen to text">🔊 Listen</button>
                    </div>
                    <span id="charCount" style="font-size: 0.8rem; color: var(--text-muted);">0 / 5000</span>
                </div>
            </div>

            <div class="box-panel">
                <label for="targetLanguage">Target Language</label>
                <select id="targetLanguage">
                    <option value="en">English</option>
                    <option value="es" selected>Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                    <option value="pt">Portuguese (Português)</option>
                    <option value="zh">Chinese (中文)</option>
                    <option value="ja">Japanese (日本語)</option>
                    <option value="ar">Arabic (العربية)</option>
                    <option value="hi">Hindi (हिन्दी)</option>
                </select>
                <textarea id="targetText" placeholder="Translation will appear here..." disabled></textarea>
                <div class="action-row">
                    <div class="btn-group">
                        <button class="icon-btn" id="speakTargetBtn" title="Listen to translation">🔊 Listen</button>
                        <button class="icon-btn" id="copyBtn" title="Copy translation">📋 Copy</button>
                    </div>
                </div>
            </div>

            <button class="translate-btn" id="translateBtn">Translate Text</button>
        </div>
    </div>

    <div class="toast" id="toastNotification">Copied to clipboard!</div>

    <script>
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const sourceLang = document.getElementById('sourceLanguage');
        const targetLang = document.getElementById('targetLanguage');
        const translateBtn = document.getElementById('translateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const speakSourceBtn = document.getElementById('speakSourceBtn');
        const speakTargetBtn = document.getElementById('speakTargetBtn');
        const charCount = document.getElementById('charCount');
        const toast = document.getElementById('toastNotification');

        // Dynamic Character Counter
        sourceText.addEventListener('input', () => {
            const length = sourceText.value.length;
            charCount.textContent = `${length} / 5000`;
        });

        // Core Translation API Handler 
        async function translateText() {
            const text = sourceText.value.trim();
            const source = sourceLang.value;
            const target = targetLang.value;

            if (!text) {
                targetText.value = '';
                return;
            }

            translateBtn.disabled = true;
            translateBtn.textContent = 'Translating...';
            targetText.placeholder = 'Processing your translation...';

            try {
                // Free serverless Mirror URL targeting standard MyMemory Translation Engine API
                const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('API server pipeline connection failed.');
                
                const data = await response.json();
                
                if (data.responseData) {
                    targetText.value = data.responseData.translatedText;
                } else {
                    throw new Error('Malformed translation object response.');
                }
            } catch (error) {
                console.error('Error handling transaction:', error);
                alert('Translation error. Please check your internet connection or try again.');
                targetText.value = '';
            } finally {
                translateBtn.disabled = false;
                translateBtn.textContent = 'Translate Text';
                targetText.placeholder = 'Translation will appear here...';
            }
        }

        // Trigger Event Listeners
        translateBtn.addEventListener('click', translateText);

        // Copy Feature Logic
        copyBtn.addEventListener('click', () => {
            if (!targetText.value) return;
            navigator.clipboard.writeText(targetText.value).then(() => {
                showToast('Translation copied to clipboard!');
            });
        });

        // Text-to-Speech Feature (Web Speech API Wrapper)
        function speak(text, langCode) {
            if (!text) return;
            // Stop processing if voice engine is already reading output
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            // Default fallbacks to English if dynamic system engine match profile is unavailable
            utterance.lang = langCode === 'auto' ? 'en' : langCode;
            window.speechSynthesis.speak(utterance);
        }

        speakSourceBtn.addEventListener('click', () => speak(sourceText.value, sourceLang.value));
        speakTargetBtn.addEventListener('click', () => speak(targetText.value, targetLang.value));

        // Toast Notification System
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
